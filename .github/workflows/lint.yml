name: linter

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: |
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          pnpm install --frozen-lockfile
          cp .env.example .env

      - name: Determine base commit
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            echo "sha=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$(git rev-parse HEAD~1 2>/dev/null || echo origin/main)" >> "$GITHUB_OUTPUT"
          fi

      # Check mode, changed files only: new/modified code must be clean; the large
      # pre-existing legacy drift is grandfathered and burns down as files are touched.
      - name: Lint changed files (Pint / Prettier / ESLint)
        run: bash bin/lint-changed.sh "${{ steps.base.outputs.sha }}"

      # resources/js/{routes,actions} are GENERATED by wayfinder from the PHP routes
      # and are gitignored, so a fresh checkout does not contain them. Without this
      # step tsc measured a DIFFERENT, SMALLER codebase than any developer sees: the
      # generated files' real errors were replaced by cheaper "cannot find module"
      # ones, and the count came out ~4 BELOW the baseline — so the ratchet passed
      # in CI no matter what. Generating here is what makes the count reproducible
      # and the baseline meaningful. If generation fails, this step fails loudly,
      # which is strictly better than silently measuring the wrong tree.
      # --with-form must match vite.config.ts's `wayfinder({ formVariants: true })`.
      # Without it the generator omits every `.form` helper — a codebase the app
      # cannot run (11 files call `.form()`; the login page renders blank) — and the
      # tsc count is taken against that, not against what ships.
      - name: Generate wayfinder output (routes/actions) — tsc measures the real tree
        run: |
          php artisan key:generate
          php artisan wayfinder:generate --with-form

      # tsc has a backlog of pre-existing errors; the ratchet fails when the error
      # count INCREASES (a new type error) and also when it DECREASES without the
      # baseline being lowered — baselines only shrink, and that is enforced, not
      # remembered.
      - name: Types (tsc ratchet)
        run: |
          pnpm run types:check > tsc-output.txt 2>&1 || true
          php bin/ci-tsc-ratchet.php tsc-output.txt

      # Constitution rule 15: authorization is never commented out. The existing
      # disabled checks are frozen in authz-lint-baseline.txt; this fails only on
      # a NEW one. (No DB needed.)
      - name: Authorization guard (no new commented-out checks)
        run: php bin/ci-authz-lint.php

      # §17.2 boundary rules (Constitution 3/10/13): school_id fallbacks, decimal
      # money casts, fee_* tables outside Finance, Finance escape hatches,
      # forceCreate in Finance tests. Known temporary exceptions are frozen in
      # boundary-lint-baseline.txt; fails only on a NEW violation. Supersedes the
      # previous inline `?? $user->school_id` grep (now the lint's literal rule).
      - name: Boundary lint (§17.2)
        run: php bin/ci-boundary-lint.php

      # S7 runtime-zero gate: no executable reference to the legacy access
      # sources (users.school_id / school_user). Baselined non-empty today,
      # ratchets to 0 as the S7 repoints land; expires at the column drop.
      - name: Runtime-zero lint (S7 legacy access sources)
        run: php bin/ci-runtime-zero-lint.php

      # 1.4b: no write path may bypass admission/staff number generation
      # (raw insert / quiet create on Student|Teacher → NULL identifier).
      - name: Identifier-generation bypass guard (1.4b)
        run: php bin/ci-identifier-generation-lint.php

      # §17.1 architecture rules (Kernel/module boundaries). No DB needed; the
      # Finance-subject rules activate automatically when app/Finance appears.
      - name: Architecture tests (§17.1)
        run: ./vendor/bin/pest --group=arch

      # §17.3: Larastan level 5 (FIXED for Phase 1) against the committed
      # phpstan-baseline.neon — fails only on NEW static-analysis findings.
      - name: Static analysis (Larastan level 5 vs baseline)
        run: composer analyse
